<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfumes - B&P Beauty Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@300;400;600&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="perfumes.css" />
  <link rel="stylesheet" href="toast.css" />
</head>
<body>
  <!-- NAV -->
  <nav>
    <!-- Back to Home -->
    <a href="index.html" class="nav-back">
      <svg class="nav-icon back-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </a>

    <div class="nav-right">
      <!-- Cart -->
      <a href="cart.html" class="nav-link">
        <div class="cart-wrap">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          <span class="cart-badge">2</span>
        </div>
      </a>
    </div>
  </nav>

  <!-- LOGO -->
  <div class="logo-section">
    <div class="logo-mark">
      <img src="../utils/logo.png" alt="B& Beauty Shop Logo" class="logo-image" />
    </div>
  </div>

  <!-- PERFUMES HEADER -->
  <div class="perfumes-header">
    <h1 class="page-title">Perfumes</h1>
    
    <div class="filters">
      <div class="size-filter">
        <button class="size-btn active" data-size="all">all</button>
        <button class="size-btn" data-size="60ml">60ml</button>
        <button class="size-btn" data-size="100ml">100ml</button>
      </div>

      <div class="gender-filter">
        <button class="gender-btn active" data-gender="all">all</button>
        <button class="gender-btn" data-gender="men">men</button>
        <button class="gender-btn" data-gender="women">women</button>
      </div>
    </div>
  </div>

  <!-- PERFUMES GRID -->
  <div class="perfumes-container">
    <div class="perfumes-grid">

    </div>
  </div>


  <!-- FOOTER -->
  <footer>
    <div class="footer-logo">B&P</div>
    <div>BEAUTY SHOP · EST. 2024</div>
    <a href="https://www.instagram.com/b_and_p_beauty_shop" target="_blank" class="footer-instagram">
    <svg class="instagram-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
      <circle cx="12" cy="12" r="4"/>
      <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/>
    </svg>
    <span>@b_and_p_beauty_shop</span>
  </a>
    <div class="footer-copy">© 2024 All rights reserved</div>
  </footer>

  <script src="perfumes.js"></script>
  <script src="toast.js"></script>

</body>
</html>
