<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Details - B&P Beauty</title>
  <link rel="stylesheet" href="product.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@300;400;600&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="toast.css" />
</head>
<body>
  <nav>
    <a href="index.html" class="nav-back">
      <svg class="nav-icon back-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </a>
    <div class="nav-right">
      <a href="cart.html" class="nav-link">
        <div class="cart-wrap">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          <span class="cart-badge">0</span>
        </div>
      </a>
    </div>
  </nav>

  <main class="product-page">
    <section class="product-image-panel">
      <div class="image-box" id="product-image">
        <!-- image loads here -->
      </div>
    </section>

    <section class="product-details-panel">
      <div class="badge" id="product-category"></div>
      <h1 id="product-name">Loading...</h1>
      <p class="product-tagline" id="product-tagline"></p>
      <div class="price-row">
        <div class="product-price" id="product-price"></div>
        <div class="product-discount" id="product-discount"></div>
      </div>
      <div class="product-meta" id="product-meta"></div>

      <div class="product-actions">
        <div class="action-field" id="product-scent-field"></div>
        <div class="quantity-group">
          <span>Quantity</span>
          <button class="qty-btn" id="qty-decrease">−</button>
          <span id="product-quantity">1</span>
          <button class="qty-btn" id="qty-increase">+</button>
        </div>
        <button class="btn btn-primary" id="add-cart-btn">Add to cart</button>
        <button class="btn btn-secondary" id="buy-now-btn">Buy now</button>
      </div>

      <div class="product-description" id="product-description-section">
        <h2>Description</h2>
        <div id="product-description"></div>
      </div>
    </section>
  </main>

  <script src="toast.js"></script>
  <script src="product.js"></script>
</body>
</html>
