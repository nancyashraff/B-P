<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout - B&P Beauty Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@300;400;600&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="toast.css" />
  <link rel="stylesheet" href="checkout.css" />
  
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="cart.html" class="nav-back">
      <svg class="nav-icon back-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </a>
    <div class="nav-right">
      <a href="cart.html" class="nav-link">
        <div class="cart-wrap">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          <span class="cart-badge">0</span>
        </div>
      </a>
    </div>
  </nav>

  <!-- LOGO -->
  <div class="logo-section">
    <div class="logo-mark">
      <img src="../utils/logo.png" alt="B& Beauty Shop Logo" class="logo-image" />
    </div>
  </div>

  <!-- CHECKOUT CONTAINER -->
  <div class="checkout-container">

    <!-- ADDRESS SECTION -->
    <div class="checkout-section">
      <h2 class="section-heading">confirm address</h2>

      <form class="address-form">
        <div class="form-group">
          <label for="email">email :</label>
          <input type="email" id="email" class="form-input" placeholder="your@email.com" required />
        </div>

        <div class="form-group">
          <button type="button" id="send-otp-btn">send OTP</button>
        </div>

        <div class="form-group" id="otp-section" style="display:none;">
          <label for="otp">enter OTP :</label>
          <input type="text" id="otp" class="form-input" placeholder="123456" required />
        </div>

        <div class="form-group">
          <label for="phone">phone number :</label>
          <input type="tel" id="phone" class="form-input" placeholder="+20 100 000 0000" required />
        </div>

        <div class="form-group">
          <label for="governorate">governorate :</label>
          <input type="text" id="governorate" class="form-input" placeholder="Cairo" required />
        </div>

        <div class="form-group">
          <label for="street">street name / land mark :</label>
          <input type="text" id="street" class="form-input" placeholder="Nasr City" required />
        </div>

        <div class="form-group">
          <label for="building">building number / name :</label>
          <input type="text" id="building" class="form-input" placeholder="Building 15" required />
        </div>

        <div class="form-group">
          <label for="apartment">apt & floor no. :</label>
          <input type="text" id="apartment" class="form-input" placeholder="Apt 501" required />
        </div>
      </form>
    </div>

    <!-- PAYMENT SUMMARY SECTION -->
    <div class="checkout-section">
      <h2 class="section-heading">payment summary</h2>

      <div class="payment-summary">
        <div class="summary-row">
          <span>subtotal :</span>
          <span class="summary-value" id="subtotal">0 L.E</span>
        </div>
        <div class="summary-row">
          <span>shipping fee :</span>
          <span class="summary-value">80 L.E</span>
        </div>
        <div class="summary-row">
          <span>payment method :</span>
          <span class="summary-value method">cash on delivery</span>
        </div>
        <div class="divider"></div>
        <div class="summary-row total">
          <span>total</span>
          <span class="summary-value" id="total">80 L.E</span>
        </div>
      </div>
    </div>

    <button class="confirm-btn">confirm checkout</button>

  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-logo">B&P</div>
    <div>BEAUTY SHOP · EST. 2024</div>
    <a href="https://www.instagram.com/b_and_p_beauty_shop" target="_blank" class="footer-instagram">
    <svg class="instagram-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
      <circle cx="12" cy="12" r="4"/>
      <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/>
    </svg>
    <span>@b_and_p_beauty_shop</span>
  </a>
    <div class="footer-copy">© 2024 All rights reserved</div>
  </footer>

  <script src="utils.js"></script>
  <script src="checkout.js"></script>
  <script src="toast.js"></script>
</body>
</html>
